# =============================================================================
# movie-finder-backend — Docker-only local development stack
#
# Scope of this compose file:
#   - postgres : local users/sessions/messages database for the backend app
#   - backend  : FastAPI app with `chain/` and `imdbapi/` mounted from source
#
# Deliberately excluded in this iteration:
#   - Local Qdrant service (Qdrant is cloud-only)
#   - Standalone child-repo dev services for `chain/`, `imdbapi/`, `rag_ingestion`
#
# Compatibility notes:
#   - No fixed `container_name` or named volumes: this stack must coexist with
#     the parent `movie-finder/` compose project on the same machine.
#   - `QDRANT_ENDPOINT`, `QDRANT_API_KEY`, and `QDRANT_COLLECTION` are exported
#     as temporary aliases until `movie-finder-chain#9` lands.
# =============================================================================

name: movie-finder-backend-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-movie_finder}
      POSTGRES_USER: ${DB_USER:-movie_finder}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Create the dedicated test database on first bootstrap so `make test`
      # never mutates the developer's local `movie_finder` data set.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-movie_finder} -d ${DB_NAME:-movie_finder}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        WITH_PROVIDERS: ${WITH_PROVIDERS:-default-cloud}
    image: movie-finder-backend:dev
    working_dir: /workspace
    command:
      [
        "/workspace/scripts/start-backend.sh",
        "uvicorn",
        "app.main:app",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    environment:
      # App runtime
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8000}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}

      # Compose always points the app at the internal postgres service. Host
      # port overrides only affect tools running on your machine.
      DATABASE_URL: postgresql://${DB_USER:-movie_finder}:${DB_PASSWORD:-devpassword}@postgres:5432/${DB_NAME:-movie_finder}

      # Shared chain / vector-store contract
      CLASSIFIER_PROVIDER: ${CLASSIFIER_PROVIDER:-anthropic}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-claude-haiku-4-5-20251001}
      REASONING_PROVIDER: ${REASONING_PROVIDER:-anthropic}
      REASONING_MODEL: ${REASONING_MODEL:-claude-sonnet-4-6}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-3072}
      VECTOR_STORE: ${VECTOR_STORE:-qdrant}
      VECTOR_COLLECTION_PREFIX: ${VECTOR_COLLECTION_PREFIX:-movies}
      VECTOR_STORE_URL: ${VECTOR_STORE_URL:-}
      VECTOR_STORE_API_KEY: ${VECTOR_STORE_API_KEY:-}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY_RO: ${QDRANT_API_KEY_RO:-}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-movies}
      CHROMADB_PERSIST_PATH: ${CHROMADB_PERSIST_PATH:-outputs/chromadb/local}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-movie-finder-rag}
      PINECONE_INDEX_HOST: ${PINECONE_INDEX_HOST:-}
      PINECONE_CLOUD: ${PINECONE_CLOUD:-aws}
      PINECONE_REGION: ${PINECONE_REGION:-us-east-1}
      PGVECTOR_DSN: ${PGVECTOR_DSN:-}
      PGVECTOR_SCHEMA: ${PGVECTOR_SCHEMA:-public}

      # Optional observability and tuning knobs
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-movie-finder}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      MAX_REFINEMENTS: ${MAX_REFINEMENTS:-3}
      IMDB_SEARCH_LIMIT: ${IMDB_SEARCH_LIMIT:-3}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:4200"]}
      GLOBAL_RATE_LIMIT: ${GLOBAL_RATE_LIMIT:-100/minute}
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-5/minute}
      CHAT_RATE_LIMIT: ${CHAT_RATE_LIMIT:-20/minute}
      MAX_MESSAGE_LENGTH: ${MAX_MESSAGE_LENGTH:-2000}
      GIT_DIR: /workspace/.gitdir
      GIT_WORK_TREE: /workspace
    volumes:
      # Surgically mount source code for maximum macOS performance.
      # This avoids the overhead of syncing .git, .venv, and cache folders.
      - ./app:/workspace/app
      - ./chain:/workspace/chain
      # Git stores the nested chain submodule worktree as a path relative to the
      # parent .git/modules tree. Mirror that path for Dockerized Git hooks.
      - ./chain:/backend/chain
      - ./scripts:/workspace/scripts
      # Mount workspace configuration and documentation.
      - ./pyproject.toml:/workspace/pyproject.toml
      - ./uv.lock:/workspace/uv.lock
      - ./Makefile:/workspace/Makefile
      - ./alembic.ini:/workspace/alembic.ini
      - ./alembic:/workspace/alembic
      - ./README.md:/workspace/README.md
      - ./CONTRIBUTING.md:/workspace/CONTRIBUTING.md
      - ./Dockerfile:/workspace/Dockerfile
      - ./.gitignore:/workspace/.gitignore
      - ./.pre-commit-config.yaml:/workspace/.pre-commit-config.yaml
      - ./.secrets.baseline:/workspace/.secrets.baseline

      # Test and coverage report output — written inside the container and
      # read back on the host (e.g. by CI artifact collectors or Coverage Gutters).
      # A directory bind mount is used instead of individual files because Docker
      # auto-creates missing bind-mount sources as directories, which would cause
      # pytest to error with "--junitxml must be a filename".
      - ./reports:/workspace/reports

      # The Bridge: Mount the submodule's metadata folder (read-only)
      # so Git can find its history without following relative submodule pointers.
      - ${BACKEND_GIT_DIR:-../.git/modules/backend}:/workspace/.gitdir
      # Nested submodules keep relative gitdir pointers to /.git/modules/... when
      # mounted at /workspace. Mirror that path so hooks can skip or inspect them.
      - ${BACKEND_GIT_DIR:-../.git/modules/backend}:/.git/modules/backend

      # Tool caches live in named volumes so rebuilds stay fast.
      - uv_cache:/root/.cache/uv
      - pre_commit_cache:/root/.cache/pre-commit
    ports:
      - "${BACKEND_HOST_PORT:-8000}:${APP_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, urllib.request; urllib.request.urlopen(f'http://localhost:{os.environ.get(\"APP_PORT\", \"8000\")}/health/live', timeout=3)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  postgres_data:
  uv_cache:
  pre_commit_cache:
