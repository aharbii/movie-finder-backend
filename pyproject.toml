[tool.uv.workspace]
members = ["imdbapi", "chain"]
# rag_ingestion is NOT a workspace member — it has its own uv.lock and lifecycle.
# app/ will be added as a member when the FastAPI layer is implemented.

[tool.pytest.ini_options]
norecursedirs = ["rag_ingestion", "app"]
filterwarnings = [
    "ignore::UserWarning:langchain_core",
]

[tool.ruff]
line-length = 100
target-version = "py313"
src = ["chain/src", "imdbapi/src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
