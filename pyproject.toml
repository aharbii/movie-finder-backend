[tool.uv.workspace]
members = ["chain", "app", "chain/imdbapi"]
# rag_ingestion is NOT a workspace member — it has its own uv.lock and lifecycle.

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = ["--import-mode=prepend"]
pythonpath = ["chain/src", "chain/imdbapi/src", "app/src", "rag_ingestion/src"]
norecursedirs = [
    "rag_ingestion",
    "chain/examples",
    "chain/imdbapi/examples",
    "rag_ingestion/scripts",
]
filterwarnings = [
    "ignore::UserWarning:langchain_core",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.ruff]
target-version = "py313"
line-length = 100
src = ["app/src", "chain/src", "chain/imdbapi/src", "rag_ingestion/src"]
exclude = ["chain/examples", "chain/imdbapi/examples", "rag_ingestion/scripts"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.13"
mypy_path = "app/src:chain/src:chain/imdbapi/src:rag_ingestion/src"
exclude = ["chain/examples", "chain/imdbapi/examples", "rag_ingestion/scripts"]
strict = true
explicit_package_bases = true
namespace_packages = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
# TitlesEndpoint has a method named `list` which mypy confuses with the builtin
# `list` type in class body annotations, even with `from __future__ import annotations`.
module = "imdbapi.endpoints.titles"
disable_error_code = ["valid-type"]

[[tool.mypy.overrides]]
# langchain_anthropic stubs require `timeout` and `stop` as positional args in
# one overload; at runtime these are optional kwargs. Suppress the false positive
# across all chain nodes and imdbapi agent that instantiate ChatAnthropic.
module = ["chain.nodes.*", "imdbapi.langchain.agent"]
disable_error_code = ["call-arg"]

[[tool.mypy.overrides]]
# create_agent (langchain.agents) returns a Pregel whose ainvoke stubs don't
# match dict[str, list[BaseMessage]] input — suppressed at the module level so
# inline comments don't get stripped by the auto-formatter.
module = "chain.nodes.qa_agent"
disable_error_code = ["call-overload"]

[tool.coverage.run]
# relative_files ensures coverage.xml paths are workspace-relative, not absolute
# container paths. Without this, Jenkins recordCoverage fails with
# "Removing non-workspace source directory '/workspace/app'" errors.
source = ["app/src", "chain/src", "chain/imdbapi/src"]
relative_files = true
branch = true
omit = ["*/tests/*", "*/examples/*", "*/py.typed"]

[tool.coverage.report]
show_missing = true
fail_under = 100
