# =============================================================================
# movie-finder-backend — pre-commit configuration
#
# Standardized repository tooling:
# - Common hooks for file health and secrets
# - Specialized linters (mypy, ruff) use mirrored repositories
# - The primary Docker-only contract remains via Makefile targets
# =============================================================================

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-ast
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.0
    hooks:
      - id: mypy
        language_version: python3.13
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - fastapi
        args:
          - --check-untyped-defs
          - --disallow-untyped-defs
          - --ignore-missing-imports
          - --warn-return-any
          - --warn-unused-ignores
          - --show-error-codes
        exclude: (^tests/|/tests/|conftest\.py$)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
